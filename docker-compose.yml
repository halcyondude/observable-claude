services:
  collector:
    build: ./collector
    ports:
      - "4001:8000"
      - "4002:8000"
    volumes:
      - ./data/duckdb:/data/duckdb
      - ./data/kuzu:/data/kuzu
    environment:
      DUCKDB_PATH: /data/duckdb/events.db
      KUZU_PATH: /data/kuzu
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

