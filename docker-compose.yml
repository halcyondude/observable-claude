services:
  collector:
    build: ./collector
    ports:
      - "4001:8000"
      - "4002:8000"
    volumes:
      - ./data/duckdb:/data/duckdb
      - ./data/ladybug:/data/ladybug
    environment:
      DUCKDB_PATH: /data/duckdb/events.db
      LADYBUG_PATH: /data/ladybug
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      collector:
        condition: service_healthy
    restart: unless-stopped
